name: Rust

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # pyo3-arrow is not part of the top-level arro3 workspace
        # See note in Cargo.toml
        working-directory: [".", "pyo3-arrow"]
    defaults:
      run:
        working-directory: ${{ matrix.working-directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.working-directory }}

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: "clippy --all"
        run: cargo clippy --all --all-features --tests -- -D warnings

      - name: "cargo check"
        run: cargo check --all --all-features

      - name: "cargo test"
        run: |
          cargo test --all
          cargo test --all --all-features

  check-emscripten:
    name: Check compile for wasm32-unknown-emscripten
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep toolchains in sync with the emscripten job in
        # .github/workflows/wheels.yml:
        # the 3.13 line's nightly override and the 3.14 line's
        # pyodide-pinned stable (`pyodide config get rust_toolchain`).
        include:
          - rust-toolchain: nightly-2026-06-01
            python-version: "3.13"
          - rust-toolchain: "1.93.0"
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust-toolchain }}
          targets: wasm32-unknown-emscripten

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --target wasm32-unknown-emscripten -p arro3-core -p arro3-compute --features pyo3/extension-module
        env:
          PYO3_CROSS_PYTHON_VERSION: ${{ matrix.python-version }}

  check-features_pyo3_arrow:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        args:
          - "--no-default-features"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cd pyo3-arrow && cargo check ${{ matrix.args }}

      - name: Test that docs build without warnings
        run: cd pyo3-arrow && cargo doc --all-features --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"
