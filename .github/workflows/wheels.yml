name: Build wheels

on:
  push:
    tags:
      - "py-v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
            manylinux: auto
          - runner: ubuntu-latest
            target: x86
            manylinux: auto
          - runner: ubuntu-latest
            target: aarch64
            manylinux: "2_24"
          - runner: ubuntu-latest
            target: armv7
            manylinux: auto
          - runner: ubuntu-latest
            target: s390x
            manylinux: auto
          - runner: ubuntu-latest
            target: ppc64le
            manylinux: auto
        module:
          - arro3-core
          - arro3-compute
          - arro3-io
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.9.x"

      - name: Install Python versions
        run: uv python install 3.9 3.10 3.11 3.13t 3.14t pypy3.11

      - name: Build abi3-py311 wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --features abi3-py311 --features extension-module -i 3.11 --manifest-path ${{ matrix.module }}/Cargo.toml
          sccache: "true"
          manylinux: ${{ matrix.platform.manylinux }}

      - name: Build version-specific wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          # As of Nov 2024, it was necessary to manually specify -i 3.13 to get
          # maturin to find the executable. --find-interpreter did not find it.
          args: --release --out dist -i 3.9 -i 3.10 -i 3.13t -i 3.14t -i pypy3.11 --manifest-path ${{ matrix.module }}/Cargo.toml
          sccache: "true"
          manylinux: ${{ matrix.platform.manylinux }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}-${{ matrix.module }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: x86
          - runner: ubuntu-latest
            target: aarch64
          - runner: ubuntu-latest
            target: armv7
        module:
          - arro3-core
          - arro3-compute
          - arro3-io
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.9.x"

      - name: Install Python versions
        run: uv python install 3.9 3.10 3.11 3.13t 3.14t pypy3.11

      - name: Build abi3-py311 wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --features abi3-py311 --features extension-module -i 3.11 --manifest-path ${{ matrix.module }}/Cargo.toml
          sccache: "true"
          manylinux: musllinux_1_2

      - name: Build version-specific wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          # As of Nov 2024, it was necessary to manually specify -i 3.13 to get
          # maturin to find the executable. --find-interpreter did not find it.
          args: --release --out dist -i 3.9 -i 3.10 -i 3.13t -i 3.14t -i pypy3.11 --manifest-path ${{ matrix.module }}/Cargo.toml
          sccache: "true"
          manylinux: musllinux_1_2

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}-${{ matrix.module }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
        module:
          - arro3-core
          - arro3-compute
          - arro3-io
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.13t
            3.14t

      - name: Build abi3-py311 wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --features abi3-py311 --features extension-module -i 3.11 --manifest-path ${{ matrix.module }}/Cargo.toml
          sccache: "true"

      - name: Build version-specific wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          # As of Nov 2024, it was necessary to manually specify -i 3.13 to get
          # maturin to find the executable. --find-interpreter did not find it.
          args: --release --out dist -i 3.9 -i 3.10 -i 3.13t -i 3.14t --manifest-path ${{ matrix.module }}/Cargo.toml
          sccache: "true"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}-${{ matrix.module }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-15
            target: aarch64
        module:
          - arro3-core
          - arro3-compute
          - arro3-io
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.9.x"

      - name: Install Python versions
        run: uv python install 3.9 3.10 3.11 3.13t 3.14t pypy3.11

      - name: Build abi3-py311 wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --features abi3-py311 --features extension-module -i 3.11 --manifest-path ${{ matrix.module }}/Cargo.toml
          sccache: "true"

      - name: Build version-specific wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          # As of Nov 2024, it was necessary to manually specify -i 3.13 to get
          # maturin to find the executable. --find-interpreter did not find it.
          args: --release --out dist -i 3.9 -i 3.10 -i 3.13t -i 3.14t -i pypy3.11 --manifest-path ${{ matrix.module }}/Cargo.toml
          sccache: "true"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}-${{ matrix.module }}
          path: dist

  # PEP 783 emscripten wheels for Pyodide. The Rust toolchain, Emscripten
  # version, rustflags, and platform tag are all defined by pyodide-build
  # (locked in uv.lock) running under the matrix Python version. See
  # DEVELOP.md "Emscripten Python wheels".
  emscripten:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
        module:
          - arro3-core
          - arro3-compute
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.9.x"
          python-version: ${{ matrix.python-version }}

      - name: Install pyodide-build
        run: uv sync --only-group pyodide

      - name: Get pyodide config
        id: pyodide-config
        run: |
          {
            echo "rust-toolchain=$(uv run --no-sync pyodide config get rust_toolchain)"
            echo "emscripten-version=$(uv run --no-sync pyodide config get emscripten_version)"
            echo "pyodide-abi-version=$(uv run --no-sync pyodide config get pyodide_abi_version)"
            echo "rustflags=$(uv run --no-sync pyodide config get rustflags)"
          } >> "$GITHUB_OUTPUT"

      - name: Install emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ steps.pyodide-config.outputs.emscripten-version }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS: ${{ steps.pyodide-config.outputs.rustflags }}
          MATURIN_PYEMSCRIPTEN_PLATFORM_VERSION: ${{ steps.pyodide-config.outputs.pyodide-abi-version }}
        with:
          target: wasm32-unknown-emscripten
          rust-toolchain: ${{ steps.pyodide-config.outputs.rust-toolchain }}
          args: --release --out dist -i ${{ matrix.python-version }} --manifest-path ${{ matrix.module }}/Cargo.toml

      # PyPI rejects legacy emscripten_x_y_z tags; fail before upload if
      # maturin didn't emit the PEP 783 pyemscripten tag.
      - name: Verify platform tag
        run: ls dist/*-pyemscripten_${{ steps.pyodide-config.outputs.pyodide-abi-version }}_wasm32.whl

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-emscripten-py${{ matrix.python-version }}-${{ matrix.module }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - arro3-core
          - arro3-compute
          - arro3-io
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path ${{ matrix.module }}/Cargo.toml
      - name: Test sdist
        run: |
          python -m pip install dist/*.tar.gz
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist-${{ matrix.module }}
          path: dist

  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - arro3-core
          - arro3-compute
          - arro3-io
    name: Release
    environment:
      name: pypi-release
      url: https://pypi.org/p/${{ matrix.module }}
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    needs: [linux, musllinux, windows, macos, emscripten]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*-${{ matrix.module }}
          merge-multiple: true
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
